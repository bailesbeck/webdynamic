<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Form</title>
    <link rel="stylesheet" href="creditcard.css">
</head>
<body>
    
</body>
</html>


<form id="payment-form">

  <div class="card-back">
    <div class="stripe"></div>
    <div class="cvc-group">
      <label for="cvc">CVC/CVV</label>
      <input type="text" id="cvc" placeholder="xxx">
    </div>
  </div>

  <div class="card-front">
    <div class="total">TOTAL: $199</div>
    <div class="chip">💳</div>

    <div class="card-number">
      <label>CARD NUMBER</label>
      <input type="text" placeholder="1234 5678 9101 1020">
    </div>

    <div class="card-name">
      <label>CARD HOLDER</label>
      <input type="text" placeholder="Bailey K">
    </div>

    <div id="cardExpiration">
      <label>EXPIRATION</label>
      <div class="exp-inputs">
        <input type="text" placeholder="MM">
        <input type="text" placeholder="YY">
      </div>
    </div>
  </div>

  <button type="submit" class="submit-btn">Submit</button>

</form>
